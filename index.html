<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube AB-Loop Controller</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-container {
            margin-bottom: 20px;
            width: 70vw;
            display: flex;
            gap: 10px;
        }
        .input-container input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .input-container button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .input-container button:hover { background-color: #cc0000; }

        .video-container {
            width: 70vw;
            position: relative;
            padding-top: calc(70vw * 9 / 16); 
            max-height: 70vh;
            background-color: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
        }

        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* コントロールボタンを1列に並べるスタイル */
        .controls {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            user-select: none; /* 長押し時にテキスト選択されないようにする */
        }
        .btn:hover {
            background-color: #eef2f7;
            transform: translateY(-1px);
        }
        .btn:active {
            transform: translateY(1px);
        }
        #playPauseBtn {
            background-color: #007bff;
            color: white;
            border: none;
        }
        #playPauseBtn:hover { background-color: #0056b3; }
        
        /* Aボタン、Bボタンのスタイル（設定時は色が変わるようにします） */
        .ab-btn {
            min-width: 110px;
        }
        .ab-btn.active {
            background-color: #28a745;
            color: white;
            border: none;
        }
        .ab-btn.active:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="input-container">
        <input type="text" id="videoUrl" placeholder="YouTubeの動画URL または 動画ID を入力">
        <button onclick="changeVideo()">読み込み</button>
    </div>

    <div class="video-container">
        <div id="player"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="skip(-10)">◀ 10秒戻す</button>
        <button class="btn" id="playPauseBtn" onclick="togglePlay()">再生 / 一時停止</button>
        <button class="btn" onclick="skip(10)">10秒進める ▶</button>
        
        <button class="btn ab-btn" id="btnA" 
                onmousedown="startPress('A')" 
                onmouseup="endPress('A')" 
                onmouseleave="cancelPress('A')"
                ontouchstart="startPress('A')" 
                ontouchend="endPress('A')">A点 (未設定)</button>
                
        <button class="btn ab-btn" id="btnB" 
                onmousedown="startPress('B')" 
                onmouseup="endPress('B')" 
                onmouseleave="cancelPress('B')"
                ontouchstart="startPress('B')" 
                ontouchend="endPress('B')">B点 (未設定)</button>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var defaultVideoId = 'dQw4w9WgXcQ'; 

        // ループ制御用の変数
        var pointA = null;
        var pointB = null;
        var loopTimer = null;

        // 長押し判定用の変数
        var pressTimer = null;
        var isLongPress = false;
        var longPressDuration = 500; // 長押しと判定する時間（ミリ秒、0.5秒）

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: defaultVideoId,
                playerVars: {
                    'playsinline': 1,
                    'controls': 1,
                    'rel': 0
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function togglePlay() {
            if (!player || typeof player.getPlayerState !== 'function') return;
            var state = player.getPlayerState();
            if (state == YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function skip(seconds) {
            if (!player || typeof player.getCurrentTime !== 'function') return;
            var currentTime = player.getCurrentTime();
            var duration = player.getDuration();
            var newTime = currentTime + seconds;

            if (newTime < 0) newTime = 0;
            if (newTime > duration) newTime = duration;

            player.seekTo(newTime, true);
        }

        function changeVideo() {
            var input = document.getElementById('videoUrl').value.trim();
            if (!input) return;
            var videoId = extractVideoId(input);
            
            if (videoId && player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(videoId);
                resetLoopSettings();
            } else {
                alert('有効なYouTubeのURLまたは動画IDが見つかりませんでした。');
            }
        }

        function extractVideoId(url) {
            var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            var match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : url;
        }

        function onPlayerStateChange(event) {
            var btn = document.getElementById('playPauseBtn');
            if (event.data == YT.PlayerState.PLAYING) {
                btn.textContent = "一時停止";
                startLoopCheck();
            } else {
                btn.textContent = "再生";
                stopLoopCheck();
            }
        }

        // --- A/Bボタンの長押し・クリック制御 ---

        // ボタンが押された時
        function startPress(type) {
            isLongPress = false;
            // 0.5秒後に長押し処理を実行するタイマーをセット
            pressTimer = setTimeout(function() {
                isLongPress = true;
                clearPoint(type);
            }, longPressDuration);
        }

        // ボタンが離された時
        function endPress(type) {
            clearTimeout(pressTimer); // タイマーを解除
            
            // 長押し判定になっていなければ、通常のクリック処理
            if (!isLongPress) {
                handleButtonClick(type);
            }
        }

        // マウスがボタンの外に出てしまったらタイマーをキャンセル
        function cancelPress(type) {
            clearTimeout(pressTimer);
        }

        // 通常クリック時の挙動
        function handleButtonClick(type) {
            if (!player || typeof player.getCurrentTime !== 'function') return;
            var currentTime = player.getCurrentTime();

            if (type === 'A') {
                if (pointA === null) {
                    // A点が未設定の場合は、その地点をA点に設定
                    pointA = currentTime;
                    updateButtonUI('A');
                } else {
                    // A点が設定済みの場合は、A点から再生を開始
                    player.seekTo(pointA, true);
                }
            } else if (type === 'B') {
                if (pointB === null) {
                    // B点が未設定の場合は、その地点をB点に設定
                    if (pointA !== null && currentTime <= pointA) {
                        alert('B点はA点より後ろの時間に設定してください。');
                        return;
                    }
                    pointB = currentTime;
                    updateButtonUI('B');
                } else {
                    // B点が設定済みの場合は、B点から再生を開始（通常はA-Bループ中ですが単体ジャンプも可能に）
                    player.seekTo(pointB, true);
                }
            }
        }

        // 長押し時のクリア処理
        function clearPoint(type) {
            if (type === 'A') {
                pointA = null;
                updateButtonUI('A');
            } else if (type === 'B') {
                pointB = null;
                updateButtonUI('B');
            }
        }

        // A/Bボタンのテキストと見た目を更新
        function updateButtonUI(type) {
            var btn = document.getElementById('btn' + type);
            var val = (type === 'A') ? pointA : pointB;

            if (val === null) {
                btn.textContent = type + "点 (未設定)";
                btn.classList.remove('active');
            } else {
                btn.textContent = type + "点 (" + formatTime(val) + ")";
                btn.classList.add('active');
            }
        }

        // 秒数を「分:秒」に変換
        function formatTime(seconds) {
            var m = Math.floor(seconds / 60);
            var s = Math.floor(seconds % 60);
            return m + ":" + (s < 10 ? "0" : "") + s;
        }

        // --- ループ監視 ---
        function startLoopCheck() {
            if (loopTimer) clearInterval(loopTimer);
            
            loopTimer = setInterval(function() {
                // A点とB点が両方設定されている場合のみループを発動
                if (pointA !== null && pointB !== null) {
                    var currentTime = player.getCurrentTime();
                    
                    // A点より前にいる場合、またはB点を超えた場合にA点に戻す
                    if (currentTime >= pointB || currentTime < pointA - 0.5) {
                        player.seekTo(pointA, true);
                    }
                }
            }, 100);
        }

        function stopLoopCheck() {
            if (loopTimer) {
                clearInterval(loopTimer);
                loopTimer = null;
            }
        }

        function resetLoopSettings() {
            pointA = null;
            pointB = null;
            updateButtonUI('A');
            updateButtonUI('B');
            stopLoopCheck();
        }
        
        // --- キーボード操作の制御 ---
        window.addEventListener('keydown', function(event) {
            // URL入力欄（input）にフォーカスがある場合は、キーボードショートカットを無効化する
            if (document.activeElement.tagName === 'INPUT') {
                return;
            }
        
            switch (event.key) {
                case ' ': // スペースキー
                    event.preventDefault(); // 画面のスクロールを防止
                    togglePlay();
                    break;
                    
                case 'ArrowLeft': // 左矢印キー
                    event.preventDefault();
                    skip(-10);
                    break;
                    
                case 'ArrowRight': // 右矢印キー
                    event.preventDefault();
                    skip(10);
                    break;
                    
                case 'a': // Aキー (小文字・大文字両対応)
                case 'A':
                    handleButtonClick('A');
                    break;
                    
                case 'b': // Bキー (小文字・大文字両対応)
                case 'B':
                    handleButtonClick('B');
                    break;
                    
                default:
                    return; // その他のキーは何もしない
            }
        });
    </script>
</body>
</html>
