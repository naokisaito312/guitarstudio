<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube AB-Loop Controller</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #121214; /* 重厚感のあるダークグレー */
            color: #e0e0e0;
            font-family: 'Consolas', 'Courier New', monospace; /* メーターや文字をデジタル感を出すフォントに */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 動画ID入力エリア（エフェクターのインプット風） */
        .input-container {
            margin-bottom: 25px;
            width: 70vw;
            display: flex;
            gap: 10px;
            background: #1a1a1e;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2d2d34;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .input-container input {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            background-color: #0d0d0f;
            border: 1px solid #3a3a45;
            border-radius: 4px;
            color: #00ffcc; /* ネオン（サイバー）グリーン */
            font-family: inherit;
        }
        .input-container input:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 8px rgba(0,255,204,0.3);
        }
        .input-container button {
            padding: 10px 20px;
            font-size: 14px;
            background-color: #B40000;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        .input-container button:hover {
            background-color: #FF0000;
        }
        
        /* プレイヤーのラッパー（モニター画面風） */
        .video-container {
            width: 70vw;
            position: relative;
            padding-top: calc(70vw * 9 / 16); 
            max-height: 70vh;
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), 0 0 1px #00ffcc; /* 微かなネオンの反射 */
            border-radius: 8px;
            overflow: hidden;
            border: 4px solid #2d2d34; /* 頑丈な金属フレーム風 */
        }
        
        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* エフェクターのコントロールパネル（シャーシ） */
        .controls {
            margin-top: 25px;
            background: linear-gradient(180deg, #25252c 0%, #1a1a1e 100%); /* 金属のヘアラインを意識したグラデ */
            border: 2px solid #3a3a45;
            border-radius: 12px;
            padding: 20px 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        
        /* 共通ボタン（フットスイッチ・頑丈なメタルボタン風） */
        .btn {
            width: 140px; /* ★ ボタンの横幅を140pxに完全固定（お好みで調整してください） */
            height: 50px; /* ★ 縦幅も統一して正方形に近い綺麗な長方形に */
            padding: 0;   /* 横幅を固定するため、内側の余白(padding)はリセット */
            font-size: 13px; /* 固定幅に文字が収まりやすいよう、少しだけ小さく調整 */
            font-weight: bold;
            font-family: inherit;
            color: #aaa;
            background: linear-gradient(180deg, #3a3a45 0%, #25252c 100%);
            border: 1px solid #4a4a57;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.1s ease;
            user-select: none;
            text-transform: uppercase;
            
            /* 文字がボタンからはみ出さないように中央配置 */
            display: inline-flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .btn:hover {
            color: #fff;
            background: linear-gradient(180deg, #454552 0%, #2d2d36 100%);
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        
        /* Aボタン、Bボタンの追加スタイル */
        .ab-btn {
            /* width: 140px; を削除（上の.btnで一括固定されたため、幅の個別指定は不要になりました） */
            position: relative;
        }
        /* A/B点 設定時のLED点灯エフェクト */
        .ab-btn.active {
            background: linear-gradient(180deg, #1e3d2f 0%, #11241b 100%);
            color: #00ffcc;
            border-color: #00ffcc;
            text-shadow: 0 0 5px rgba(0,255,204,0.6);
            box-shadow: 0 0 12px rgba(0,255,204,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .ab-btn.active:hover {
            background: linear-gradient(180deg, #27523f 0%, #163024 100%);
        }
    </style>
</head>
<body>

    <div class="input-container">
        <input type="text" id="videoUrl" placeholder="YouTubeの動画URL または 動画ID を入力">
        <button onclick="changeVideo()">読み込み</button>
    </div>

    <div class="video-container">
        <div id="player"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="skip(-10)">◀ 10秒戻す</button>
        <button class="btn" id="playPauseBtn" onclick="togglePlay()">再生 / 一時停止</button>
        <button class="btn" onclick="skip(10)">10秒進める ▶</button>
        
        <button class="btn ab-btn" id="btnA" 
                onmousedown="startPress('A')" 
                onmouseup="endPress('A')" 
                onmouseleave="cancelPress('A')"
                ontouchstart="startPress('A')" 
                ontouchend="endPress('A')">POINT A<br>(--)</button>
                
        <button class="btn ab-btn" id="btnB" 
                onmousedown="startPress('B')" 
                onmouseup="endPress('B')" 
                onmouseleave="cancelPress('B')"
                ontouchstart="startPress('B')" 
                ontouchend="endPress('B')">POINT B<br>(--)</button>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var defaultVideoId = 'dQw4w9WgXcQ'; 

        // ループ制御用の変数
        var pointA = null;
        var pointB = null;
        var loopTimer = null;

        // 長押し判定用の変数
        var pressTimer = null;
        var isLongPress = false;
        var longPressDuration = 500; // 長押しと判定する時間（ミリ秒、0.5秒）

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: defaultVideoId,
                playerVars: {
                    'playsinline': 1,
                    'controls': 1,
                    'rel': 0
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function togglePlay() {
            if (!player || typeof player.getPlayerState !== 'function') return;
            var state = player.getPlayerState();
            if (state == YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function skip(seconds) {
            if (!player || typeof player.getCurrentTime !== 'function') return;
            var currentTime = player.getCurrentTime();
            var duration = player.getDuration();
            var newTime = currentTime + seconds;

            if (newTime < 0) newTime = 0;
            if (newTime > duration) newTime = duration;

            player.seekTo(newTime, true);
        }

        function changeVideo() {
            var input = document.getElementById('videoUrl').value.trim();
            if (!input) return;
            var videoId = extractVideoId(input);
            
            if (videoId && player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(videoId);
                resetLoopSettings();
            } else {
                alert('有効なYouTubeのURLまたは動画IDが見つかりませんでした。');
            }
        }

        function extractVideoId(url) {
            var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            var match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : url;
        }

        function onPlayerStateChange(event) {
            var btn = document.getElementById('playPauseBtn');
            if (event.data == YT.PlayerState.PLAYING) {
                btn.textContent = "一時停止";
                startLoopCheck();
            } else {
                btn.textContent = "再生";
                stopLoopCheck();
            }
        }

        // --- A/Bボタンの長押し・クリック制御 ---

        // ボタンが押された時
        function startPress(type) {
            isLongPress = false;
            // 0.5秒後に長押し処理を実行するタイマーをセット
            pressTimer = setTimeout(function() {
                isLongPress = true;
                clearPoint(type);
            }, longPressDuration);
        }

        // ボタンが離された時
        function endPress(type) {
            clearTimeout(pressTimer); // タイマーを解除
            
            // 長押し判定になっていなければ、通常のクリック処理
            if (!isLongPress) {
                handleButtonClick(type);
            }
        }

        // マウスがボタンの外に出てしまったらタイマーをキャンセル
        function cancelPress(type) {
            clearTimeout(pressTimer);
        }

        // 通常クリック時の挙動
        function handleButtonClick(type) {
            if (!player || typeof player.getCurrentTime !== 'function') return;
            var currentTime = player.getCurrentTime();

            if (type === 'A') {
                if (pointA === null) {
                    // A点が未設定の場合は、その地点をA点に設定
                    pointA = currentTime;
                    updateButtonUI('A');
                } else {
                    // A点が設定済みの場合は、A点から再生を開始
                    player.seekTo(pointA, true);
                }
            } else if (type === 'B') {
                if (pointB === null) {
                    // B点が未設定の場合は、その地点をB点に設定
                    if (pointA !== null && currentTime <= pointA) {
                        alert('B点はA点より後ろの時間に設定してください。');
                        return;
                    }
                    pointB = currentTime;
                    updateButtonUI('B');
                } else {
                    // B点が設定済みの場合は、B点から再生を開始（通常はA-Bループ中ですが単体ジャンプも可能に）
                    player.seekTo(pointB, true);
                }
            }
        }

        // 長押し時のクリア処理
        function clearPoint(type) {
            if (type === 'A') {
                pointA = null;
                updateButtonUI('A');
            } else if (type === 'B') {
                pointB = null;
                updateButtonUI('B');
            }
        }

        // A/Bボタンのテキストと見た目を更新
        function updateButtonUI(type) {
            var btn = document.getElementById('btn' + type);
            var val = (type === 'A') ? pointA : pointB;

            if (val === null) {
                btn.innerHTML = "POINT " + type + "<br>(--)";
                btn.classList.remove('active');
            } else {
                btn.innerHTML = "POINT " + type + "<br>(" + formatTime(val) + ")";
                btn.classList.add('active');
            }
        }

        // 秒数を「分:秒」に変換
        function formatTime(seconds) {
            var m = Math.floor(seconds / 60);
            var s = Math.floor(seconds % 60);
            return m + ":" + (s < 10 ? "0" : "") + s;
        }

        // --- ループ監視 ---
        function startLoopCheck() {
            if (loopTimer) clearInterval(loopTimer);
            
            loopTimer = setInterval(function() {
                // A点とB点が両方設定されている場合のみループを発動
                if (pointA !== null && pointB !== null) {
                    var currentTime = player.getCurrentTime();
                    
                    // A点より前にいる場合、またはB点を超えた場合にA点に戻す
                    if (currentTime >= pointB || currentTime < pointA - 0.5) {
                        player.seekTo(pointA, true);
                    }
                }
            }, 100);
        }

        function stopLoopCheck() {
            if (loopTimer) {
                clearInterval(loopTimer);
                loopTimer = null;
            }
        }

        function resetLoopSettings() {
            pointA = null;
            pointB = null;
            updateButtonUI('A');
            updateButtonUI('B');
            stopLoopCheck();
        }
        
        // --- キーボード操作の制御 ---
        window.addEventListener('keydown', function(event) {
            // URL入力欄（input）にフォーカスがある場合は、キーボードショートカットを無効化する
            if (document.activeElement.tagName === 'INPUT') {
                return;
            }
        
            switch (event.key) {
                case ' ': // スペースキー
                    event.preventDefault(); // 画面のスクロールを防止
                    togglePlay();
                    break;
                    
                case 'ArrowLeft': // 左矢印キー
                    event.preventDefault();
                    skip(-10);
                    break;
                    
                case 'ArrowRight': // 右矢印キー
                    event.preventDefault();
                    skip(10);
                    break;
                    
                case 'a': // Aキー (小文字・大文字両対応)
                case 'A':
                    handleButtonClick('A');
                    break;
                    
                case 'b': // Bキー (小文字・大文字両対応)
                case 'B':
                    handleButtonClick('B');
                    break;
                    
                default:
                    return; // その他のキーは何もしない
            }
        });
    </script>
</body>
</html>
