<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Lesson Studio</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #121214; /* 重厚感のあるダークグレー */
            color: #e0e0e0;
            font-family: 'Consolas', 'Courier New', monospace; /* メーターや文字をデジタル感を出すフォントに */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 動画ID入力エリア（エフェクターのインプット風） */
        .input-container {
            margin-bottom: 25px;
            width: 70vw;
            display: flex;
            gap: 10px;
            background: #1a1a1e;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2d2d34;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .input-container input {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            background-color: #0d0d0f;
            border: 1px solid #3a3a45;
            border-radius: 4px;
            color: #00ffcc; /* ネオン（サイバー）グリーン */
            font-family: inherit;
        }
        .input-container input:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 8px rgba(0,255,204,0.3);
        }
        .input-container button {
            padding: 10px 20px;
            font-size: 14px;
            background-color: #B40000;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        .input-container button:hover {
            background-color: #FF0000;
        }
        
        /* プレイヤーのラッパー（モニター画面風） */
        .video-container {
            width: 70vw;
            position: relative;
            padding-top: calc(70vw * 9 / 16); 
            max-height: 70vh;
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), 0 0 1px #00ffcc; /* 微かなネオンの反射 */
            border-radius: 8px;
            overflow: hidden;
            border: 4px solid #2d2d34; /* 頑丈な金属フレーム風 */
        }
        
        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* エフェクターのコントロールパネル（シャーシ） */
        .controls {
            margin-top: 25px;
            background: linear-gradient(180deg, #25252c 0%, #1a1a1e 100%); /* 金属のヘアラインを意識したグラデ */
            border: 2px solid #3a3a45;
            border-radius: 12px;
            padding: 20px 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        
        /* 共通ボタン（フットスイッチ・頑丈なメタルボタン風） */
        .btn {
            width: 140px;
            height: 60px;
            padding: 0;
            /* 1行目の基本スタイル */
            font-size: 14px;
            color: #bbb;           /* 普段は少し控えめなグレーに */
            letter-spacing: 1px;   /* 文字の間隔を少し広げて機材の印字っぽく */
            
            font-weight: bold;
            font-family: inherit;
            background: linear-gradient(180deg, #3a3a45 0%, #25252c 100%);
            border: 1px solid #4a4a57;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.1s ease;
            user-select: none;
            text-transform: uppercase;
            display: inline-flex;
            flex-direction: column; /* 上下2行に並びやすくする */
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.4;
            outline: none;
        }
        .btn:focus {
            outline: none;
        }
        
        .btn:hover {
            color: #ddd;
            background: linear-gradient(180deg, #454552 0%, #2d2d36 100%);
        }
        
        .btn-status {
            font-size: 12px;       /* 2行目の文字サイズ */
            margin-top: 2px;       /* 1行目との隙間を微調整 */
            font-family: 'Consolas', 'Courier New', monospace; /* デジタル数字感を強調 */
        }
        
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        
        /* Aボタン、Bボタンの追加スタイル */
        .ab-btn {
            position: relative;
        }
        /* A/B点 設定時のLED点灯エフェクト */
        .ab-btn.active {
            background: linear-gradient(180deg, #1e3d2f 0%, #11241b 100%);
            color: #a0ffd0;        /* 設定時は1行目も少し緑がかった薄い色に */
            border-color: #00ffcc;
            box-shadow: 0 0 12px rgba(0,255,204,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .ab-btn.active:hover {
            background: linear-gradient(180deg, #27523f 0%, #163024 100%);
        }

        /* ★新設：速度コントロール全体の枠 */
        .speed-panel {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px dashed #3a3a45;
            gap: 10px;
        }

        /* 液晶ディスプレイ風の速度表示窓 */
        .speed-display {
            width: 80px;
            height: 48px;
            background-color: #0d0d0f;
            border: 2px solid #2d2d34;
            border-radius: 4px;
            font-size: 10px;
            color: #666;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
        .speed-display span {
            font-size: 15px;
            color: #00ffcc; /* 最初はサイバーグリーン */
            text-shadow: 0 0 5px rgba(0,255,204,0.4);
            margin-top: 2px;
        }

        /* 速度調整ボタンのレイアウト調整 */
        .speed-buttons {
            display: flex;
            flex-direction: column; /* 縦に2つ並べてスッキリさせる */
            gap: 6px;
        }
        .btn.speed-btn {
            width: 90px;
            height: 27px; /* 高さを半分にしてコンパクトに */
            font-size: 12px;
            border-radius: 3px;
        }

        /* ★新設：TAPコントロール全体の枠 */
        .tap-panel {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px dashed #3a3a45;
            gap: 10px;
        }

        /* 液晶ディスプレイ風のBPM表示窓 */
        .tap-display {
            width: 70px;
            height: 48px;
            background-color: #0d0d0f;
            border: 2px solid #2d2d34;
            border-radius: 4px;
            font-size: 10px;
            color: #666;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
        .tap-display span {
            font-size: 16px;
            color: #444; /* 最初（未設定）は暗く沈ませる */
            margin-top: 2px;
            transition: color 0.1s;
        }

        /* TAP専用のコンパクトなボタン */
        .btn.tap-btn {
            width: 70px;
            height: 48px;
            font-size: 11px;
            border-radius: 6px;
            border-color: #555;
            color: #ccc;
        }
        .btn.tap-btn:hover {
            background: linear-gradient(180deg, #4a4a57 0%, #2f2f38 100%);
            color: #fff;
        }

        /* メトロノームボタンとLEDのスタイル */
        .btn.metro-btn {
            width: 80px;
            height: 48px;
            font-size: 10px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }
        
        /* 物理的なLEDランプを再現 */
        .metro-led {
            width: 8px;
            height: 8px;
            background-color: #333; /* 消灯時はダークグレー */
            border-radius: 50%;
            transition: all 0.2s;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
        }
        
        /* メトロノームON時（待機中）のうっすらした点灯 */
        .metro-led.on {
            background-color: #990000; /* 鈍い赤 */
        }
        
        /* 音が鳴った瞬間の強烈なフラッシュ（JSで制御） */
        .metro-led.flash {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="input-container">
        <input type="text" id="videoUrl" placeholder="YouTubeの動画URL または 動画ID を入力">
        <button onclick="changeVideo()">LOAD</button>
    </div>

    <div class="video-container">
        <div id="player"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="skip(-10)">-10 sec</button>
        <button class="btn" id="playPauseBtn" onclick="togglePlay()">Play / Pause</button>
        <button class="btn" onclick="skip(10)">+10 sec</button>
        
        <button class="btn ab-btn" id="btnA" 
                onmousedown="startPress('A')" 
                onmouseup="endPress('A')" 
                onmouseleave="cancelPress('A')"
                ontouchstart="startPress('A')" 
                ontouchend="endPress('A')">A<br><span class="btn-status" style="color: #666;">--:--</span></button>
                
        <button class="btn ab-btn" id="btnB" 
                onmousedown="startPress('B')" 
                onmouseup="endPress('B')" 
                onmouseleave="cancelPress('B')"
                ontouchstart="startPress('B')" 
                ontouchend="endPress('B')">B<br><span class="btn-status" style="color: #666;">--:--</span></button>

        <div class="speed-panel">
            <div class="speed-display" id="speedDisplay">SPEED<br><span>1.0x</span></div>
            <div class="speed-buttons">
                <button class="btn speed-btn" onclick="changeSpeed(1)">SPEED +</button>
                <button class="btn speed-btn" onclick="changeSpeed(-1)">SPEED -</button>
            </div>
        </div>

        <div class="tap-panel">
            <button class="btn metro-btn" id="metroBtn" onclick="toggleMetronome()">
                METRO
                <span class="metro-led" id="metroLed"></span>
            </button>
            <div class="tap-display" id="bpmDisplay">BPM<br><span>---</span></div>
            <button class="btn tap-btn" id="tapBtn" onmousedown="tapBPM()">TAP</button>
        </div>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var defaultVideoId = 'dQw4w9WgXcQ'; 

        // ループ制御用の変数
        var pointA = null;
        var pointB = null;
        var loopTimer = null;

        // 長押し判定用の変数
        var pressTimer = null;
        var isLongPress = false;
        var longPressDuration = 500; // 長押しと判定する時間（ミリ秒、0.5秒）

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: defaultVideoId,
                playerVars: {
                    'playsinline': 1,
                    'controls': 1,
                    'rel': 0
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function togglePlay() {
            if (!player || typeof player.getPlayerState !== 'function') return;
            var state = player.getPlayerState();
            if (state == YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function skip(seconds) {
            if (!player || typeof player.getCurrentTime !== 'function') return;
            var currentTime = player.getCurrentTime();
            var duration = player.getDuration();
            var newTime = currentTime + seconds;

            if (newTime < 0) newTime = 0;
            if (newTime > duration) newTime = duration;

            player.seekTo(newTime, true);
        }

        function changeVideo() {
            var input = document.getElementById('videoUrl').value.trim();
            if (!input) return;
            var videoId = extractVideoId(input);
            
            if (videoId && player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(videoId);
                resetLoopSettings();
            } else {
                alert('有効なYouTubeのURLまたは動画IDが見つかりませんでした。');
            }
        }

        function extractVideoId(url) {
            var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            var match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : url;
        }

        // プレーヤーの状態が変更されたときに呼び出される関数
        function onPlayerStateChange(event) {
            // ★【超重要ガード】カウントイン中は、YouTubeの状態変化によるタイマー再起動を完全にスルーする
            if (isCountingIn) return;

            if (event.data == YT.PlayerState.PLAYING) {
                // 再生が開始されたらループチェックをスタート（A点、B点が設定されていれば動く）
                startLoopCheck();
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                // 一時停止または終了したら、一旦ループチェックを停止する
                // ただし、A-B点が設定されている場合は停止させないように安全処理
                if (pointA === null || pointB === null) {
                    stopLoopCheck();
                }
            }
        }

        // --- A/Bボタンの長押し・クリック制御 ---

        // ボタンが押された時
        function startPress(type) {
            isLongPress = false;
            // 0.5秒後に長押し処理を実行するタイマーをセット
            pressTimer = setTimeout(function() {
                isLongPress = true;
                clearPoint(type);
            }, longPressDuration);
        }

        // ボタンが離された時
        function endPress(type) {
            clearTimeout(pressTimer); // タイマーを解除
            
            // 長押し判定になっていなければ、通常のクリック処理
            if (!isLongPress) {
                handleButtonClick(type);
            }
        }

        // マウスがボタンの外に出てしまったらタイマーをキャンセル
        function cancelPress(type) {
            clearTimeout(pressTimer);
        }

        // 通常クリック時の挙動
        // --- 補正機能付き：A/Bボタンクリック時の処理 ---
        function handleButtonClick(type) {
            if (!player || typeof player.getCurrentTime !== 'function') return;

            var val = (type === 'A') ? pointA : pointB;

            if (val === null) {
                // 現在の動画の再生時間を取得
                var rawTime = player.getCurrentTime();
                
                // ★【ここがポイント：タイムラグ補正】
                // ボタンを押したタイミングより「0.18秒」手前の時間を記録する
                var correctedTime = rawTime - 0.18;
                
                // マイナス秒（動画の開始前）になってしまわないように、0秒未満は0秒に固定する
                if (correctedTime < 0) {
                    correctedTime = 0;
                }

                // 補正した時間を変数に代入
                if (type === 'A') {
                    pointA = correctedTime;
                } else {
                    pointB = correctedTime;
                }
                
                updateButtonUI(type);

                // A点とB点が揃ったら自動でループチェックを開始
                if (pointA !== null && pointB !== null) {
                    startLoopCheck();
                }
            } else {
                // すでに設定されている場合は、その時間へジャンプ
                player.seekTo(val, true);
            }
        }

        // 長押し時のクリア処理
        function clearPoint(type) {
            if (type === 'A') {
                pointA = null;
                updateButtonUI('A');
            } else if (type === 'B') {
                pointB = null;
                updateButtonUI('B');
            }
        }

        // A/Bボタンのテキストと見た目を更新
        function updateButtonUI(type) {
            var btn = document.getElementById('btn' + type);
            var val = (type === 'A') ? pointA : pointB;
        
            if (val === null) {
                // 未設定時は下段を少し暗いグレーに
                btn.innerHTML = type + "<br><span class='btn-status' style='color: #666;'>--:--</span>";
                btn.classList.remove('active');
            } else {
                // 設定時は下段がネオンカラー（#00ffcc）で目立つように
                btn.innerHTML = type + "<br><span class='btn-status' style='color: #00ffcc; font-weight: bold; font-size: 14px;'>" + formatTime(val) + "</span>";
                btn.classList.add('active');
            }
        }

        // 秒数を「分:秒」に変換
        function formatTime(seconds) {
            var m = Math.floor(seconds / 60);
            var s = Math.floor(seconds % 60);
            return m + ":" + (s < 10 ? "0" : "") + s;
        }

        // --- 修正版：3秒前プレロール＆フェードイン付きループ監視 ---
        var isPreRolling = false; // プレロール（巻き戻り処理）中かどうかのフラグ

        function startLoopCheck() {
            if (loopTimer) {
                clearInterval(loopTimer);
                loopTimer = null;
            }
            
            loopTimer = setInterval(function() {
                if (!player || typeof player.getCurrentTime !== 'function') return;

                // 巻き戻し処理中でない場合のみB点の到達チェックを行う
                if (pointA !== null && pointB !== null && !isPreRolling) {
                    var currentTime = player.getCurrentTime();
                    
                    if (currentTime >= 0 && currentTime >= pointB) {
                        isPreRolling = true; // 多重発動防止フラグをオン
                        
                        // ① A点の「3秒前」の時間を計算
                        var preRollTime = pointA - 3;
                        if (preRollTime < 0) {
                            preRollTime = 0; // 0秒未満になる場合は0秒に固定
                        }
                        
                        // ② 計算した位置へジャンプ
                        player.seekTo(preRollTime, true);
                        
                        // ③ 音量を0にしてフェードイン関数を呼び出す
                        player.setVolume(0);
                        startFadeIn();
                        
                        // ④ 少し時間を置いてからフラグを解除（シーク時のラグによる誤作動防止）
                        setTimeout(function() {
                            isPreRolling = false;
                        }, 500);
                    }
                }
            }, 100);
        }

        // --- 音を滑らかにフェードインさせる関数 ---
        function startFadeIn() {
            var targetVolume = 100; // 最終的な音量（最大）
            var currentVolume = 0;
            var duration = 3000;   // 3秒かけてフェードイン
            var intervalTime = 50; // 50ミリ秒ごとに音量を更新
            var step = targetVolume / (duration / intervalTime); // 1回あたりの音量増加量

            var fadeTimer = setInterval(function() {
                if (!player || typeof player.setVolume !== 'function') {
                    clearInterval(fadeTimer);
                    return;
                }

                currentVolume += step;
                if (currentVolume >= targetVolume) {
                    player.setVolume(targetVolume);
                    clearInterval(fadeTimer); // 目標音量に達したらタイマー停止
                } else {
                    player.setVolume(Math.round(currentVolume));
                }
            }, intervalTime);
        }
        
        function stopLoopCheck() {
            if (loopTimer) {
                clearInterval(loopTimer);
                loopTimer = null;
            }
        }

        function resetLoopSettings() {
            pointA = null;
            pointB = null;
            updateButtonUI('A');
            updateButtonUI('B');
            stopLoopCheck();
        }

        // --- 再生速度コントロールのロジック ---
        // YouTubeがサポートしている標準的な再生速度のリスト
        var speedRates = [0.25, 0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
        var currentSpeedIndex = 3; // デフォルトは 1.0 (配列の3番目)

        function changeSpeed(direction) {
            if (!player || typeof player.setPlaybackRate !== 'function') return;

            // インデックスを増減
            currentSpeedIndex += direction;

            // 最小値と最大値の範囲内に収める
            if (currentSpeedIndex < 0) currentSpeedIndex = 0;
            if (currentSpeedIndex >= speedRates.length) currentSpeedIndex = speedRates.length - 1;

            var targetSpeed = speedRates[currentSpeedIndex];
            player.setPlaybackRate(targetSpeed);

            // 速度ディスプレイの表示を更新
            var displaySpan = document.querySelector('#speedDisplay span');
            displaySpan.textContent = targetSpeed.toFixed(2) + "x";

            // 標準(1.0x)以外のときは液晶の文字をネオンオレンジっぽくして警告灯を演出
            if (targetSpeed === 1.0) {
                displaySpan.style.color = '#00ffcc'; // 通常グリーン
            } else {
                displaySpan.style.color = '#ff9900'; // テンポ変更中オレンジ
            }
        }

        // --- TAP BPM コントロールのロジック ---
        var tapTimes = [];
        var tapTimeoutTimer = null;

        function tapBPM() {
            var now = Date.now();

            // 前回のタップから3秒以上空いたら、新しい曲の計測とみなしてリセット
            if (tapTimes.length > 0 && (now - tapTimes[tapTimes.length - 1] > 3000)) {
                tapTimes = [];
            }

            tapTimes.push(now);

            // 2回以上タップされたらBPMを計算
            if (tapTimes.length > 1) {
                // タップ間のすべての間隔（ミリ秒）を計算して平均を出す
                var intervals = [];
                for (var i = 1; i < tapTimes.length; i++) {
                    intervals.push(tapTimes[i] - tapTimes[i - 1]);
                }
                
                var avgInterval = intervals.reduce(function(a, b) { return a + b; }) / intervals.length;
                
                // ミリ秒からBPMに変換 (60000ms / 平均間隔)
                var bpm = Math.round(60000 / avgInterval);

                // 画面表示を更新（ネオンレッド/ピンクでBPMを表示）
                var bpmSpan = document.querySelector('#bpmDisplay span');
                bpmSpan.textContent = bpm;
                bpmSpan.style.color = '#ff3b30';
                bpmSpan.style.textShadow = '0 0 8px rgba(255,59,48,0.6)';
            }

            // 視覚的なフィードバック：タップした瞬間にボタンを一瞬フラッシュさせる
            var tapBtn = document.getElementById('tapBtn');
            tapBtn.style.background = 'linear-gradient(180deg, #555 0%, #333 100%)';
            setTimeout(function() {
                tapBtn.style.background = ''; // 元のCSSに戻す
            }, 50);
        }

        // --- メトロノームのロジック ---
        var audioCtx = null;
        var metroTimer = null;
        var isMetroPlaying = false;
        var currentBeat = 0;
        var nextNoteTime = 0.0; // 次の音が鳴るべき絶対時間（秒）
        var scheduleAheadTime = 0.1; // どれくらい未来までスケジュールするか（秒）
        var lookahead = 25.0; // 次のチェックまでの間隔（ミリ秒）

        function toggleMetronome() {
            // 最初の一歩でオーディオコンテキストを初期化（ブラウザのセキュリティ対策）
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (pointA === null && pointB === null && (!player || typeof player.getPlayerState !== 'function' || player.getPlayerState() !== YT.PlayerState.PLAYING)) {
                // 音声再生の有効化のため一度動かす
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            isMetroPlaying = !isMetroPlaying;
            var led = document.getElementById('metroLed');
            var btn = document.getElementById('metroBtn');

            if (isMetroPlaying) {
                // BPMがまだ計測されていない場合はデフォルト120にする
                var currentBPM = parseInt(document.querySelector('#bpmDisplay span').textContent);
                if (isNaN(currentBPM)) {
                    currentBPM = 120;
                    var bpmSpan = document.querySelector('#bpmDisplay span');
                    bpmSpan.textContent = currentBPM;
                    bpmSpan.style.color = '#ff3b30';
                }

                currentBeat = 0;
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduler(); // スケジューラ開始
                
                led.classList.add('on');
                btn.style.borderColor = '#ff3b30';
            } else {
                if (metroTimer) clearTimeout(metroTimer);
                
                // ★【ここを追記】手動停止時も予約された音をクリア
                activeOscillators.forEach(function(activeOsc) {
                    try { activeOsc.stop(); } catch(e) {}
                });
                activeOscillators = [];

                led.classList.remove('on');
                led.classList.remove('flash');
                btn.style.borderColor = '';
            }
        }

        // 高精度タイマーのためのスケジューラー（バックグラウンドでのズレを防ぐ仕組み）
        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleNote(currentBeat, nextNoteTime);
                advanceNote();
            }
            metroTimer = setTimeout(scheduler, lookahead);
        }

        function advanceNote() {
            var currentBPM = parseInt(document.querySelector('#bpmDisplay span').textContent) || 120;
            var secondsPerBeat = 60.0 / currentBPM;
            nextNoteTime += secondsPerBeat; // 次の拍の時間を計算

            currentBeat = (currentBeat + 1) % 4; // 4拍子ループ
        }

        // カウントイン中に鳴った拍数を数える変数と、発振器を記録する配列
        var countInBeats = 0; 
        var activeOscillators = []; // 先読みされた発振器を溜めておく配列

        // 実際に電子音を作る関数
        function scheduleNote(beatNumber, time) {
            if (!isMetroPlaying) return;

            var osc = audioCtx.createOscillator();
            var gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            // 1拍目は高音(880Hz)、2,3,4拍子は低音(440Hz)
            if (beatNumber === 0) {
                osc.frequency.setValueAtTime(880, time);
            } else {
                osc.frequency.setValueAtTime(440, time);
            }

            // 音の長さ（歯切れの良い0.05秒のクリック音）
            gainNode.gain.setValueAtTime(0.3, time); // 音量
            gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.05);

            osc.start(time);
            osc.stop(time + 0.06);

            // ★【重要】生成した発振器を配列に記録しておく（後で強制停止できるようにするため）
            activeOscillators.push(osc);

            // 視覚的フィードバック：音に合わせてLEDを一瞬光らせる
            setTimeout(function() {
                var led = document.getElementById('metroLed');
                if (led && isMetroPlaying) {
                    led.classList.add('flash');
                    if (beatNumber === 0) {
                        led.style.background = '#ff3b30'; // 1拍目は赤
                        led.style.boxShadow = '0 0 10px #ff3b30';
                    } else {
                        led.style.background = '#00ffcc'; // 2,3,4拍目は緑
                        led.style.boxShadow = '0 0 10px #00ffcc';
                    }
                    setTimeout(function() {
                        led.classList.remove('flash');
                        if (isMetroPlaying) {
                            led.style.background = '#990000'; // 待機状態の暗い赤
                            led.style.boxShadow = 'none';
                        }
                    }, 40);
                }
            }, (time - audioCtx.currentTime) * 1000);

            // カウントイン中の場合、拍数を正確に4回数えてから動画を再生する
            if (isCountingIn) {
                countInBeats++; // 鳴った拍数をインクリメント
                
                // 4拍（1、2、3、4）鳴り終わった瞬間のタイミングを計算
                if (countInBeats === 9) {
                    var playDelay = (time - audioCtx.currentTime) * 1000;
                    
                    // 次の小節の頭（5拍目の直前）で正確に動画をリスタート
                    setTimeout(function() {
                        if (isCountingIn) {
                            isCountingIn = false; // カウントイン終了
                            countInBeats = 0;     // カウンターをリセット
                            
                            // ★【ここが確実なバグ修正】
                            // 先読みでブラウザに予約されてしまった未来の「ぴ」の音をすべて物理的に破壊・消去する
                            activeOscillators.forEach(function(activeOsc) {
                                try {
                                    activeOsc.stop(); // 鳴る予定の音を強制停止
                                } catch(e) {}
                            });
                            activeOscillators = []; // 配列を空にする

                            // タイマーをクリアしてメトロノームを完全OFFにする
                            if (metroTimer) {
                                clearTimeout(metroTimer);
                                metroTimer = null;
                            }
                            isMetroPlaying = false;

                            // LEDとボタンの外観を完全消灯にリセット
                            var led = document.getElementById('metroLed');
                            var btn = document.getElementById('metroBtn');
                            if (led) {
                                led.classList.remove('on');
                                led.classList.remove('flash');
                                led.style.background = '#333';
                                led.style.boxShadow = 'none';
                            }
                            if (btn) btn.style.borderColor = '';
                            
                            // 次回復帰時は綺麗な1拍目（beatNumber=0）から予約させる
                            currentBeat = 0; 
                            
                            // 動画の再生を開始
                            if (player && typeof player.playVideo === 'function') {
                                player.playVideo();
                            }
                        }
                    }, playDelay);
                }
            }
        }

        // TAP BPMが更新された時に、動的にメトロノームの速度も追従させるための処理
        // 既存の tapBPM() 関数の最後のほう、bpmSpan.textContent = bpm; のすぐ下あたりに「if(isMetroPlaying) { /* 何もしなくてOK（自動追従します） */ }」となるよう、念のため既存のロジックと統合されています。
        // --- キーボード操作の制御 ---
        window.addEventListener('keydown', function(event) {
            // URL入力欄（input）にフォーカスがある場合は、キーボードショートカットを無効化する
            if (document.activeElement.tagName === 'INPUT') {
                return;
            }
        
            switch (event.key) {
                case ' ': // スペースキー
                    event.preventDefault(); // 画面のスクロールを防止
                    togglePlay();
                    break;
                    
                case 'ArrowLeft': // 左矢印キー
                    event.preventDefault();
                    skip(-10);
                    break;
                    
                case 'ArrowRight': // 右矢印キー
                    event.preventDefault();
                    skip(10);
                    break;
                    
                case 'a': // Aキー (小文字・大文字両対応)
                case 'A':
                    handleButtonClick('A');
                    break;
                    
                case 'b': // Bキー (小文字・大文字両対応)
                case 'B':
                    handleButtonClick('B');
                    break;

                case 'ArrowDown': // 下矢印キーで減速
                    changeSpeed(-1);
                    break;
                    
                case 'ArrowUp': // 上矢印キーで加速
                    changeSpeed(1);
                    break;

                case 't': // Tキー（小文字・大文字両対応）
                case 'T':
                    tapBPM();
                    break;

                case 'm': // Mキー（小文字・大文字両対応）
                case 'M':
                    toggleMetronome();
                    break;
                
                default:
                    return; // その他のキーは何もしない
            }
        });
    </script>
</body>
