<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube AB-Loop Controller</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-container {
            margin-bottom: 20px;
            width: 70vw;
            display: flex;
            gap: 10px;
        }
        .input-container input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .input-container button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .input-container button:hover { background-color: #cc0000; }

        .video-container {
            width: 70vw;
            position: relative;
            padding-top: calc(70vw * 9 / 16); 
            max-height: 70vh;
            background-color: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
        }

        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* コントロールボタンを1列に並べるスタイル */
        .controls {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            user-select: none; /* 長押し時にテキスト選択されないようにする */
        }
        .btn:hover {
            background-color: #eef2f7;
            transform: translateY(-1px);
        }
        .btn:active {
            transform: translateY(1px);
        }
        #playPauseBtn {
            background-color: #007bff;
            color: white;
            border: none;
        }
        #playPauseBtn:hover { background-color: #0056b3; }
        
        /* Aボタン、Bボタンのスタイル（設定時は色が変わるようにします） */
        .ab-btn {
            min-width: 110px;
        }
        .ab-btn.active {
            background-color: #28a745;
            color: white;
            border: none;
        }
        .ab-btn.active:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="input-container">
        <input type="text" id="videoUrl" placeholder="YouTubeの動画URL または 動画ID を入力">
        <button onclick="changeVideo()">読み込み</button>
    </div>

    <div class="video-container">
        <div id="player"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="skip(-10)">◀ 10秒戻す</button>
        <button class="btn" id="playPauseBtn" onclick="togglePlay()">再生 / 一時停止</button>
        <button class="btn" onclick="skip(10)">10秒進める ▶</button>
        
        <button class="btn ab-btn" id="btnA" 
                onmousedown="startPress('A')" 
                onmouseup="endPress('A')" 
                onmouseleave="cancelPress('A')"
                ontouchstart="startPress('A')" 
                ontouchend="endPress('A')">A点 (未設定)</button>
                
        <button class="btn ab-btn" id="btnB" 
                onmousedown="startPress('B')" 
                onmouseup="endPress('B')" 
                onmouseleave="cancelPress('B')"
                ontouchstart="startPress('B')" 
                ontouchend="endPress('B')">B点 (未設定)</button>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var defaultVideoId = 'dQw4w9WgXcQ'; 

        // ループ制御用の変数
        var pointA = null;
        var pointB = null;
        var loopTimer = null;

        // 長押し判定用の変数
        var pressTimer = null;
        var isLongPress = false;
        var longPressDuration = 500; // 長押しと判定する時間（ミリ秒、0.5秒）

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: defaultVideoId,
                playerVars: {
                    'playsinline': 1,
                    'controls': 1,
                    'rel': 0
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function togglePlay() {
            if (!player || typeof player.getPlayerState !== 'function') return;
            var state = player.getPlayerState();
            if (state == YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function skip(seconds) {
            if (!player || typeof player.getCurrentTime !== 'function') return;
            var currentTime = player.getCurrentTime();
            var duration = player.getDuration();
            var newTime = currentTime + seconds;

            if (newTime < 0) newTime = 0;
            if (newTime > duration) newTime = duration;

            player.seekTo(newTime, true);
        }

        function changeVideo() {
            var input = document.getElementById('videoUrl').value.trim();
            if (!input) return;
            var videoId = extractVideoId(input);
            
            if (videoId && player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(videoId);
                resetLoopSettings();
            } else {
                alert('有効なYouTubeのURLまたは動画IDが見つかりませんでした。');
            }
        }

        function extractVideoId(url) {
            var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            var match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : url;
        }

        function onPlayerStateChange(event) {
            var btn = document.getElementById('playPauseBtn');
            if (event.data == YT.PlayerState.PLAYING) {
                btn.textContent = "一時停止";
                startLoopCheck();
            } else {
                btn.textContent = "再生";
                stopLoopCheck();
            }
        }

        // --- A/Bボタンの長押し・クリック制御 ---

        // ボタンが押された時
        function startPress(type) {
            isLongPress = false;
            // 0.5秒後に長押し処理を実行するタイマーをセット
            pressTimer = setTimeout(function() {
                isLongPress = true;
                clearPoint(type);
            }, longPressDuration);
        }

        // ボタンが離された時
        function endPress(type) {
            clearTimeout(pressTimer); // タイマーを解除
            
            // 長押し判定になっていなければ、通常のクリック処理
            if (!isLongPress) {
                handleButtonClick(type);
            }
        }

        // マウスがボタンの外に出てしまったらタイマーをキャンセル
        function cancelPress(type) {
            clearTimeout(pressTimer);
        }

        // 通常クリック時の挙動
        function handleButtonClick(type) {
            if (!player || typeof player.getCurrentTime !== 'function
