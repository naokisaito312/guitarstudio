<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube AB-Loop Controller</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-container {
            margin-bottom: 20px;
            width: 70vw;
            display: flex;
            gap: 10px;
        }
        .input-container input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .input-container button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .input-container button:hover {
            background-color: #cc0000;
        }

        .video-container {
            width: 70vw;
            position: relative;
            padding-top: calc(70vw * 9 / 16); 
            max-height: 70vh;
            background-color: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
        }

        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* ループ設定コントロールのスタイル */
        .loop-container {
            margin-top: 15px;
            width: 70vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .loop-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .loop-btn {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .loop-btn:hover { background-color: #5a6268; }
        
        /* ループ有効化スイッチ */
        .switch-box {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #333;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        .btn:hover {
            background-color: #eef2f7;
            transform: translateY(-1px);
        }
        #playPauseBtn {
            background-color: #007bff;
            color: white;
            border: none;
        }
        #playPauseBtn:hover { background-color: #0056b3; }
        
        /* 時間表示用 */
        .time-display {
            font-size: 14px;
            color: #555;
            min-width: 80px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="input-container">
        <input type="text" id="videoUrl" placeholder="YouTubeの動画URL または 動画ID を入力">
        <button onclick="changeVideo()">読み込み</button>
    </div>

    <div class="video-container">
        <div id="player"></div>
    </div>

    <div class="loop-container">
        <div class="loop-box">
            <button class="loop-btn" onclick="setPoint('A')">A点を設定 (開始)</button>
            <span class="time-display" id="displayA">未設定</span>
        </div>
        
        <div class="switch-box">
            <input type="checkbox" id="loopEnabled" onchange="toggleLoopCheckbox()">
            <label for="loopEnabled">ABループを有効化</label>
        </div>

        <div class="loop-box">
            <button class="loop-btn" onclick="setPoint('B')">B点を設定 (終了)</button>
            <span class="time-display" id="displayB">未設定</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="skip(-10)">◀ 10秒戻す</button>
        <button class="btn" id="playPauseBtn" onclick="togglePlay()">再生 / 一時停止</button>
        <button class="btn" onclick="skip(10)">10秒進める ▶</button>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var defaultVideoId = 'dQw4w9WgXcQ'; 

        // ループ制御用の変数
        var pointA = null;
        var pointB = null;
        var loopTimer = null;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: defaultVideoId,
                playerVars: {
                    'playsinline': 1,
                    'controls': 1,
                    'rel': 0
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function togglePlay() {
            if (!player || typeof player.getPlayerState !== 'function') return;
            var state = player.getPlayerState();
            if (state == YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function skip(seconds) {
            if (!player || typeof player.getCurrentTime !== 'function') return;
            var currentTime = player.getCurrentTime();
            var duration = player.getDuration();
            var newTime = currentTime + seconds;

            if (newTime < 0) newTime = 0;
            if (newTime > duration) newTime = duration;

            player.seekTo(newTime, true);
        }

        function changeVideo() {
            var input = document.getElementById('videoUrl').value.trim();
            if (!input) return;
            var videoId = extractVideoId(input);
            
            if (videoId && player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(videoId);
                resetLoopSettings(); // 動画が変わったらループ設定をリセット
            } else {
                alert('有効なYouTubeのURLまたは動画IDが見てつかりませんでした。');
            }
        }

        function extractVideoId(url) {
            var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            var match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : url;
        }

        function onPlayerStateChange(event) {
            var btn = document.getElementById('playPauseBtn');
            if (event.data == YT.PlayerState.PLAYING) {
                btn.textContent = "一時停止";
                startLoopCheck(); // 再生が始まったら時間監視を開始
            } else {
                btn.textContent = "再生";
                stopLoopCheck();  // 停止したら監視も止める
            }
        }

        // --- ここからABループ用のロジック ---

        // 現在の再生時間をA点またはB点に設定
        function setPoint(type) {
            if (!player || typeof player.getCurrentTime !== 'function') return;
            var currentTime = player.getCurrentTime();
            
            if (type === 'A') {
                pointA = currentTime;
                document.getElementById('displayA').textContent = formatTime(pointA);
            } else if (type === 'B') {
                pointB = currentTime;
                document.getElementById('displayB').textContent = formatTime(pointB);
            }

            // AとBが両方設定され、かつA < B の場合は自動でループにチェックを入れる
            if (pointA !== null && pointB !== null && pointA < pointB) {
                document.getElementById('loopEnabled').checked = true;
            }
        }

        // ループの有効・無効チェックボックスが切り替わった時
        function toggleLoopCheckbox() {
            var isChecked = document.getElementById('loopEnabled').checked;
            if (isChecked) {
                if (pointA === null || pointB === null) {
                    alert('A点とB点の両方を設定してください。');
                    document.getElementById('loopEnabled').checked = false;
                    return;
                }
                if (pointA >= pointB) {
                    alert('B点はA点より後ろの時間に設定してください。');
                    document.getElementById('loopEnabled').checked = false;
                    return;
                }
                // 有効化した瞬間に、もし現在地がB点より先ならA点にジャンプ
                if (player && player.getCurrentTime() > pointB) {
                    player.seekTo(pointA, true);
                }
            }
        }

        // 秒数を「分:秒.ミリ秒」の形式に変換する関数
        function formatTime(seconds) {
            var m = Math.floor(seconds / 60);
            var s = Math.floor(seconds % 60);
            return m + ":" + (s < 10 ? "0" : "") + s;
        }

        // 再生時間の監視を開始 (0.1秒ごとにチェック)
        function startLoopCheck() {
            if (loopTimer) clearInterval(loopTimer);
            
            loopTimer = setInterval(function() {
                var isEnabled = document.getElementById('loopEnabled').checked;
                if (!isEnabled || pointA === null || pointB === null) return;

                var currentTime = player.getCurrentTime();
                
                // 現在の再生時間がB点を超えたら、A点へ巻き戻す
                if (currentTime >= pointB) {
                    player.seekTo(pointA, true);
                }
            }, 100); // 100ミリ秒ごとにチェック（精度を上げたい場合は数字を小さく）
        }

        // 再生時間の監視を停止
        function stopLoopCheck() {
            if (loopTimer) {
                clearInterval(loopTimer);
                loopTimer = null;
            }
        }

        // 新しい動画が読み込まれた時に設定を初期化する
        function resetLoopSettings() {
            pointA = null;
            pointB = null;
            document.getElementById('loopEnabled').checked = false;
            document.getElementById('displayA').textContent = "未設定";
            document.getElementById('displayB').textContent = "未設定";
            stopLoopCheck();
        }
    </script>
</body>
</html>
